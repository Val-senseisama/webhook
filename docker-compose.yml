services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    env_file: .env
    depends_on: []       # Supabase is external; no local DB service needed
    restart: unless-stopped

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile.worker
    env_file: .env
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "3000:3000"
    env_file: .env
    restart: unless-stopped
